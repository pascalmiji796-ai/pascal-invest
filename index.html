<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pascal Invest | Multipliez vos revenus</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; }
        nav { background: #000; padding: 20px; text-align: center; border-bottom: 2px solid #f1c40f; }
        .hero { padding: 50px 20px; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1611974717483-58285a8373b4?auto=format&fit=crop&q=80'); background-size: cover; }
        .calc-container { background: #1e1e1e; padding: 30px; border-radius: 15px; max-width: 400px; margin: -50px auto 30px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #333; color: white; box-sizing: border-box; }
        .calc-btn { width: 100%; background: #f1c40f; color: black; border: none; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-wa { display: block; background: #25d366; color: white; text-decoration: none; padding: 15px; border-radius: 50px; font-weight: bold; margin: 20px auto; max-width: 300px; text-align: center; }
        .btn-preuves { color: #f1c40f; text-decoration: none; font-weight: bold; }
        #result { margin-top: 20px; padding: 15px; background: #27ae60; border-radius: 5px; display: none; }
    </style>
</head>
<body>

    <nav>
        <div style="font-size: 24px; color: #f1c40f; font-weight: bold;">PASCAL INVEST</div>
        <a href="preuves.html" class="btn-preuves">Voir les Preuves de Paiement</a>
    </nav>

    <header class="hero">
        <h1>Investissez Aujourd'hui, Profitez Demain</h1>
        <p>Gagnez entre 10% et 50% de bénéfices en 24h.</p>
    </header>

    <div class="calc-container">
        <h2 style="text-align: center;">Simulateur de Gains</h2>
        <label>Montant à investir ($)</label>
        <input type="number" id="montant" placeholder="Ex: 100">
        
        <label>Plan d'investissement</label>
        <select id="plan">
            <option value="0.10">Plan Start (+10% / 24h)</option>
            <option value="0.25">Plan Business (+25% / 24h)</option>
            <option value="0.50">Plan Premium (+50% / 24h)</option>
        </select>

        <button class="calc-btn" onclick="calculer()">CALCULER MES GAINS</button>
        
        <div id="result"></div>
        
        <a href="https://wa.me/243830827301" class="btn-wa">COMMENCER SUR WHATSAPP</a>
    </div>

    <script>
        function calculer() {
            let m = document.getElementById('montant').value;
            let p = document.getElementById('plan').value;
            let res = document.getElementById('result');
            if(m > 0) {
                let profit = m * p;
                let total = parseFloat(m) + profit;
                res.style.display = 'block';
                res.innerHTML = `💰 Profit : <b>${profit.toFixed(2)}$</b><br>🚀 Total à recevoir : <b>${total.toFixed(2)}$</b>`;
            }
        }
    </script>

</body>
</html>
