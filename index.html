<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASCAL INVEST - Accueil</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding-top: 70px; text-align: center; }
        #notif-bar {
            background: #ff0000; color: white; padding: 15px;
            position: fixed; top: 0; left: 0; width: 100%;
            z-index: 10000; font-weight: bold; border-bottom: 2px solid #fff;
        }
        .container { padding: 20px; }
        .logo { font-size: 32px; font-weight: bold; color: #ff0000; }
        .btn-main {
            background: #ff0000; color: white; padding: 18px 35px;
            border: none; border-radius: 30px; font-size: 18px; font-weight: bold;
            cursor: pointer; text-decoration: none; display: inline-block; margin: 20px 0;
        }
        .calc-box { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; max-width: 400px; margin: 20px auto; }
        input, select { padding: 12px; width: 90%; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; }
        .whatsapp-float {
            position: fixed; bottom: 20px; right: 20px; background: #25d366; 
            width: 60px; height: 60px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; z-index: 10001; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="notif-bar">
    🔥 <span id="notif-text">Initialisation des transactions...</span>
</div>

<div class="container">
    <div class="logo">PASCAL INVEST</div>
    <p style="color: #aaa;">La plateforme leader d'investissement en RDC.</p>
    
    <a href="preuves.html" class="btn-main">S'INSCRIRE / SE CONNECTER</a>
    
    <div class="calc-box">
        <h3>Calculateur de Profit</h3>
        <input type="number" id="montant" placeholder="Montant à investir ($)">
        <select id="plan">
            <option value="0.5">Plan Argent (50% / 24h)</option>
            <option value="1">Plan Gold (100% / 48h)</option>
        </select>
        <button onclick="calculer()" class="btn-main" style="padding: 10px 20px; font-size: 16px;">Calculer</button>
        <div id="resultat" style="margin-top: 15px; font-size: 22px; color: #00ff00; font-weight: bold;"></div>
    </div>
</div>

<a href="https://wa.me/243830827301" class="whatsapp-float">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
</a>

<script>
    const notifications = [
        "Musalizi D. vient de retirer 350$ via Airtel Money",
        "Nouvel investissement de 100$ reçu de Kinshasa",
        "Retrait validé : +120$ pour Kabongo J.",
        "Dernier paiement : 800$ envoyé il y a 5 minutes"
    ];
    function updateNotif() {
        const textElement = document.getElementById('notif-text');
        const randomIndex = Math.floor(Math.random() * notifications.length);
        textElement.innerHTML = notifications[randomIndex];
    }
    setInterval(updateNotif, 6000);
    updateNotif();

    function calculer() {
        let m = document.getElementById("montant").value;
        let p = document.getElementById("plan").value;
        if(m > 0) {
            let profit = m * p;
            document.getElementById("resultat").innerHTML = "Total : " + (parseFloat(m) + profit).toFixed(2) + " $";
        }
    }
</script>
</body>
</html>
